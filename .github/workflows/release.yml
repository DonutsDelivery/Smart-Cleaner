name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Verify binary
        run: ls -la target/release/sysclean

      - name: Package tarball
        run: |
          mkdir -p dist/sysclean
          cp target/release/sysclean dist/sysclean/
          cp data/sysclean.desktop dist/sysclean/
          cp icons/sysclean.svg dist/sysclean/
          cp README.md dist/sysclean/
          cd dist && tar czf ../sysclean-x86_64.tar.gz sysclean

      - name: Package standalone binary
        run: cp target/release/sysclean sysclean-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sysclean-x86_64.tar.gz
            sysclean-x86_64
